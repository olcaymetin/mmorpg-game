<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        var errDiv = document.createElement('div');
        errDiv.style.position = 'fixed';
        errDiv.style.top = '10px';
        errDiv.style.left = '10px';
        errDiv.style.right = '10px';
        errDiv.style.background = 'rgba(220, 38, 38, 0.95)';
        errDiv.style.color = '#fff';
        errDiv.style.padding = '15px';
        errDiv.style.fontFamily = 'monospace';
        errDiv.style.fontSize = '12px';
        errDiv.style.zIndex = '999999';
        errDiv.style.borderRadius = '8px';
        errDiv.style.border = '2px solid #ef4444';
        errDiv.style.maxHeight = '80vh';
        errDiv.style.overflowY = 'auto';
        errDiv.style.whiteSpace = 'pre-wrap';
        errDiv.innerHTML = '<strong>🚨 Client JavaScript Error:</strong><br>' + 
          message + '<br><br><strong>Source:</strong> ' + source + ':' + lineno + ':' + colno + 
          '<br><br><strong>Stack Trace:</strong><br>' + (error && error.stack ? error.stack : 'N/A');
        document.body.appendChild(errDiv);
        return false;
      };
      window.onunhandledrejection = function(event) {
        var errDiv = document.createElement('div');
        errDiv.style.position = 'fixed';
        errDiv.style.top = '10px';
        errDiv.style.left = '10px';
        errDiv.style.right = '10px';
        errDiv.style.background = 'rgba(220, 38, 38, 0.95)';
        errDiv.style.color = '#fff';
        errDiv.style.padding = '15px';
        errDiv.style.fontFamily = 'monospace';
        errDiv.style.fontSize = '12px';
        errDiv.style.zIndex = '999999';
        errDiv.style.borderRadius = '8px';
        errDiv.style.border = '2px solid #ef4444';
        errDiv.style.maxHeight = '80vh';
        errDiv.style.overflowY = 'auto';
        errDiv.style.whiteSpace = 'pre-wrap';
        errDiv.innerHTML = '<strong>🚨 Unhandled Promise Rejection:</strong><br>' + 
          event.reason + (event.reason && event.reason.stack ? '<br><br><strong>Stack Trace:</strong><br>' + event.reason.stack : '');
        document.body.appendChild(errDiv);
      };
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="MMORPG Phase 1 — Multiplayer prototype built with Phaser 3 + Colyseus + React"
    />
    <title>MMORPG — Phase 1</title>
    <!-- Retro pixel font + modern UI font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        background: #0a0a0f;
        overflow: hidden;
      }
      #root {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
